<script>
const data = [

"[00BFFF][b]έεοέεπέεο [FFD700]έεπέεοέεπ",
"[FFD700][b]έεοέεπέεο [FF00FF]έεπέεοέεπ",
"[FF4500][b]έεοέεπέεο [00FFFF]έεπέεοέεπ",
"[00FF00][b]έεοέεπέεο [FF4500]έεπέεοέεπ",
"[FF00FF][b]έεοέεπέεο [FFD700]έεπέεοέεπ",
"[00FFFF][b]έεοέεπέεο [39FF14]έεπέεοέεπ",
"[FFA500][b]έεοέεπέεο [FF00FF]έεπέεοέεπ",
"[FF0000][b]έεοέεπέεο [00FF00]έεπέεοέεπ",
"[00BFFF][b]έεοέεπέεο [FF1493]έεπέεοέεπ",
"[39FF14][b]έεοέεπέεο [00FFFF]έεπέεοέεπ",
"[FFD700][b]έεοέεπέεο [FF4500]έεπέεοέεπ",
"[FF1493][b]έεοέεπέεο [00BFFF]έεπέεοέεπ",
"[0000FF][b]έεοέεπέεο [FFD700]έεπέεοέεπ",

"[00FF00][b]έεοέεπέεο [0000FF]έεπέεοέεπ"
];

function parseML(text) {
  let color = "#ffffff";
  return text
    .replace(/\[([A-F0-9]{6})\]/g, (_, c) => {
      color = "#" + c;
      return `<span style="color:${color}">`;
    })
    .replace(/\[i\]/g, "<i>")
    .replace(/\[\/i\]/g, "</i>")
    .replace(/\[b\]/g, "<b>")
    .replace(/\[\/b\]/g, "</b>")
    + "</span>";
}

function copyText(text) {
  const textarea = document.createElement("textarea");
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand("copy");
  document.body.removeChild(textarea);
}

const container = document.getElementById("list");

data.forEach((text, index) => {
  const div = document.createElement("div");
  div.className = "item";

  const preview = document.createElement("div");
  preview.className = "preview";
  preview.innerHTML = (index + 1) + ". " + parseML(text);

  const raw = document.createElement("div");
  raw.className = "raw";
  raw.textContent = text;

  const btn = document.createElement("button");
  btn.textContent = "Copy";
  btn.onclick = () => {
    copyText(text);
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy", 1000);
  };

  div.appendChild(preview);
  div.appendChild(raw);
  div.appendChild(btn);

  container.appendChild(div);
});
</script>
